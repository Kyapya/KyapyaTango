name: Sync dictionary from Notion

on:
  workflow_dispatch:
    inputs:
      word:
        description: Optional single word to sync
        required: false
        type: string
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: write

concurrency:
  group: notion-dictionary-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Check Python syntax
        run: python -m py_compile scripts/*.py

      - name: Run synchronization selection tests
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Sync Notion pages
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATA_SOURCE_ID: ${{ secrets.NOTION_DATA_SOURCE_ID }}
          REQUESTED_WORD: ${{ inputs.word }}
        run: |
          args=()
          if [ -n "$REQUESTED_WORD" ]; then
            args+=(--word "$REQUESTED_WORD")
          else
            args+=(--allow-partial)
          fi
          python scripts/sync_notion.py "${args[@]}"

      - name: Build static site
        run: python scripts/build_site.py

      - name: Validate generated site
        run: python scripts/validate_site.py

      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content index.html words data
          if git diff --cached --quiet; then
            echo "No dictionary changes found."
            exit 0
          fi
          git commit -m "Sync dictionary from Notion"
          git push
